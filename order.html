<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>طلب خدمة | ProjectPro</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="navbar">
    <div class="brand">
        <img src="./assets/logo.png" class="logo" alt="ProjectPro Logo">
        <span class="brand-name">ProjectPro</span>
    </div>

    <a href="index.html" class="nav-icon back-btn">←</a>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="services.html">الخدمات</a>
        <a href="about.html">حول</a>
        <a href="contact.html">تواصل</a>
        <a href="order.html" class="btn-nav">اطلب الآن</a>
    </nav>
</header>

<section class="hero">
    <div class="iphone-frame">
        <h1>اطلب خدمتك الآن</h1>
        <p>املأ البيانات وسنراجع طلبك مباشرة</p>

        <form action="https://formsubmit.co/projectpro.sa0@gmail.com" method="POST" class="order-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="اسم العميل" required>
            </div>
            <div class="form-group">
                <input type="text" name="phone" placeholder="رقم الجوال" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="البريد الإلكتروني (اختياري)">
            </div>
            <div class="form-group">
                <textarea name="service" rows="5" placeholder="اكتب تفاصيل الخدمة المطلوبة" required></textarea>
            </div>
            <button type="submit">إرسال الطلب</button>
        </form>
    </div>
</section>

</body>
</html>
